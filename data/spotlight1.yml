content: |
  Dans mon doctorat à l'Université de Sherbrooke, j'étudie les changements de biodiversité, l'extinction locale et la colonisation des espèces dans les écosystèmes du Québec. Mon travail combine information spatiale, effort d'échantillonnage et méthodes bayésiennes pour mieux interpréter les données écologiques.
