id: "science-citoyenne"
title : "Oiseaux, eBird et science citoyenne"
content: |
  Les oiseaux sont au coeur de plusieurs de mes projets: Grue du Canada, Tétras du Canada, Hibou des marais, Nyctale de Tengmalm et analyses de mouvements migratoires. Je participe aussi à eBird depuis 2017, avec plus de 1600 listes d'observations au niveau mondial et jusqu'à 274 espèces recensées au Québec. Pour moi, la science citoyenne est à la fois une façon d'observer le vivant, de contribuer à la recherche et de garder les pieds dans le terrain.
